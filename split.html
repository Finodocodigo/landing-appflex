<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Redirigiendo…</title>

  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif;display:flex;align-items:center;justify-content:center}
    .msg{text-align:center;font-size:14px;opacity:.7;letter-spacing:.5px}
    .spinner{width:42px;aspect-ratio:1;margin:0 auto 14px;border-radius:50%;background:radial-gradient(farthest-side,#E50914 94%,#0000) top/6px 6px no-repeat,conic-gradient(#0000 30%,#E50914);-webkit-mask:radial-gradient(farthest-side,#0000 calc(100% - 6px),#000 0);animation:s .75s infinite linear}
    @keyframes s{100%{transform:rotate(1turn)}}
  </style>
</head>
<body>

<div class="msg">
  <div class="spinner"></div>
  Redirigiendo…
</div>

<script>
(function(){
  // ============================================================
  // A/B SPLIT — configurar os DOIS destinos aqui (distribuição 50/50)
  // ============================================================
  var DESTINATIONS = [
    'https://pay.hotmart.com/V104915667K?off=wodtzxg2&checkoutMode=10', // Variante A (domínio 1)
    'https://pay.hotmart.com/V104915667K?off=wodtzxg2&checkoutMode=10'  // Variante B (domínio 2)
  ];
  // ============================================================

  var idx = Math.random() < 0.5 ? 0 : 1;
  var destBase = DESTINATIONS[idx];

  try {
    var page = new URL(window.location.href);
    var dest = new URL(destBase);

    var passthrough = [
      'xcod','sck',
      'utm_source','utm_medium','utm_campaign',
      'utm_content','utm_term','utm_id'
    ];
    passthrough.forEach(function(k){
      var v = page.searchParams.get(k);
      if (v && !dest.searchParams.has(k)) dest.searchParams.set(k, v);
    });

    window.location.replace(dest.toString());
  } catch (err) {
    window.location.replace(destBase);
  }
})();
</script>

</body>
</html>
