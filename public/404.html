<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found · The Vital Years</title>
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#FBF6EC" />

  <link rel="icon" href="/assets/favicon.ico" sizes="any" />
  <link rel="preconnect" href="https://fonts.bunny.net" crossorigin />
  <link rel="stylesheet" href="https://fonts.bunny.net/css?family=archivo:500,600|dm-serif-display:400|spectral:300,400,500" />

  <style>
    :root{--paper:#FBF6EC;--paper-2:#F4EADb;--ink:#2A2520;--ink-soft:#5B5247;--ink-mute:#8A7F70;--clay:#B4541E;--clay-dk:#8F3F14;--display:"DM Serif Display",Georgia,serif;--serif:"Spectral",Georgia,serif;--label:"Archivo",system-ui,sans-serif}
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;flex-direction:column;background:var(--paper);color:var(--ink);font-family:var(--serif);line-height:1.7;
      background-image:radial-gradient(120% 80% at 50% -10%, rgba(180,84,30,.05), transparent 60%)}
    .wrap{width:min(680px,92vw);margin:0 auto}
    a{color:var(--clay-dk)}a:hover{color:var(--clay)}
    .masthead{border-bottom:2px solid var(--ink)}
    .masthead .wrap{display:flex;align-items:center;gap:12px;padding:22px 0 16px}
    .seal{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--clay);color:var(--clay-dk);display:grid;place-items:center;font-family:var(--display);font-size:1.3rem}
    .wm{font-family:var(--display);font-size:1.7rem;line-height:.95;text-decoration:none;color:var(--ink)}
    main{flex:1;display:flex;align-items:center;padding:60px 0}
    .num{font-family:var(--display);font-size:clamp(4rem,16vw,8rem);line-height:.9;color:var(--clay)}
    h1{font-family:var(--display);font-weight:400;font-size:clamp(1.8rem,5vw,2.6rem);margin:8px 0 14px}
    p{color:var(--ink-soft);font-size:1.1rem;max-width:52ch}
    .back{display:inline-block;margin-top:22px;font-family:var(--label);font-weight:600;letter-spacing:.04em;background:var(--clay);color:#fff;text-decoration:none;padding:12px 24px;border-radius:3px}
    .back:hover{background:#cf6326;color:#fff}
    footer{border-top:2px solid var(--ink);background:var(--paper-2);font-family:var(--label);font-size:.76rem;color:var(--ink-mute)}
    footer .wrap{padding:20px 0}
  </style>
</head>
<body>
  <header class="masthead">
    <div class="wrap">
      <span class="seal" aria-hidden="true">V</span>
      <a class="wm" href="/">The Vital Years</a>
    </div>
  </header>

  <main>
    <div class="wrap">
      <div class="num">404</div>
      <h1>We looked in the drawer.</h1>
      <p>The letter you were searching for is not filed at this address. Perhaps it
      was mislaid, perhaps it was never written. Either way, we are sorry for the
      wandering.</p>
      <a class="back" href="/">Return to the front page</a>
    </div>
  </main>

  <footer>
    <div class="wrap">&copy; 2026 The Vital Years &middot; Giulia Batista. United States.</div>
  </footer>
</body>
</html>
