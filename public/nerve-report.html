<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title>Special Report</title>
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <!-- ===================================================================
       PLACEHOLDER LANDING — Nervaline (neuropathy) · route /nerve-report
       Cloaked by functions/nerve-report.js. The advertorial body + VTurb
       player are added in a LATER step; the tracking plumbing below is wired
       and testable now. Fill the __REPLACE__ markers before going live.
       =================================================================== -->

  <!-- Meta Pixel (THIS product's pixel — public; CAPI token stays a CF secret).
       Replace __REPLACE_META_PIXEL_ID_NERVE__ with the Nervaline numeric pixel
       ID. PageView fires on load; InitiateCheckout fires on CTA click
       (attribution script before </body>) sharing the eventID for dedup. -->
  <script>
    !function (f, b, e, v, n, t, s) {
      if (f.fbq) return; n = f.fbq = function () { n.callMethod ?
      n.callMethod.apply(n, arguments) : n.queue.push(arguments) };
      if (!f._fbq) f._fbq = n; n.push = n; n.loaded = !0; n.version = '2.0';
      n.queue = []; t = b.createElement(e); t.async = !0;
      t.src = v; s = b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t, s)
    }(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '__REPLACE_META_PIXEL_ID_NERVE__');
    (function () {
      var pvId = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
        : String(Date.now()) + Math.random().toString(16).slice(2);
      fbq('track', 'PageView', {}, { eventID: pvId });
    })();
  </script>
  <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=__REPLACE_META_PIXEL_ID_NERVE__&ev=PageView&noscript=1" /></noscript>
  <!-- End Meta Pixel -->

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:#0f1115;color:#e7e9ee;display:flex;align-items:center;justify-content:center;
      min-height:100vh;padding:24px;text-align:center;line-height:1.5}
    .wrap{max-width:520px}
    .dot{width:10px;height:10px;border-radius:50%;background:#c0392b;display:inline-block;margin-right:8px;
      animation:p 1.4s infinite}
    @keyframes p{0%,100%{opacity:.3}50%{opacity:1}}
    h1{font-size:1.25rem;font-weight:700;margin:14px 0 10px}
    p{color:#aab0bd;font-size:.95rem}
    .hidden{display:none}
  </style>
</head>

<body>

  <main class="wrap">
    <p><span class="dot"></span>Special report loading</p>
    <h1>This briefing is being prepared.</h1>
    <p>Please check back shortly.</p>
  </main>

  <!-- CTA skeleton (hidden). The advertorial fill replaces this with the real
       price cards. Each CTA needs: the BuyGoods checkout URL for Nervaline
       (with its product_codename baked in), data-bg-value (tier price → Meta
       Purchase value via subid2), data-bg-product (tier label → subid3). -->
  <div class="hidden" id="offer">
    <a class="js-bg-cta"
       href="__REPLACE_BUYGOODS_URL_NERVE__"
       data-bg-value="__REPLACE_TIER_PRICE__"
       data-bg-product="__REPLACE_TIER_LABEL__">Continue</a>
  </div>

  <!-- Attribution wiring (BuyGoods) — identical pattern to the reference stack.
       Generates a per-visit `subid`, persists it (+ UTMs) to /checkout-session
       so the postback can join on it in D1, fires InitiateCheckout (browser fbq
       + server /tracker, deduped by eventID), then navigates to BuyGoods with
       subid/subid2/subid3 (+ prod for per-product pixel routing on /p/checkout). -->
  <script>
  (function () {
    var PRODUCT = 'nerve'; // per-product pixel routing key (see functions/_pixels.js)

    var STORAGE_KEY = 'krob_subid';
    var subid = '';
    try { subid = sessionStorage.getItem(STORAGE_KEY) || ''; } catch (_) {}
    if (!subid) {
      subid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
        : String(Date.now()) + Math.random().toString(16).slice(2);
      try { sessionStorage.setItem(STORAGE_KEY, subid); } catch (_) {}
    }

    var q = new URLSearchParams(window.location.search);
    var utm = {
      utm_source:   q.get('utm_source')   || '',
      utm_medium:   q.get('utm_medium')   || '',
      utm_campaign: q.get('utm_campaign') || '',
      utm_content:  q.get('utm_content')  || '',
      utm_term:     q.get('utm_term')     || '',
    };

    var checkoutSessionReady = Promise.resolve();
    try {
      checkoutSessionReady = fetch('/checkout-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        keepalive: true,
        body: JSON.stringify(Object.assign({ subid: subid, event_source_url: window.location.href }, utm)),
      }).catch(function () {});
    } catch (_) {}

    function fireInitiateCheckout(tierValue, tierProduct) {
      var eventId = 'bg-checkout-' + subid;
      var numericValue = parseFloat(tierValue);
      var safeValue = Number.isFinite(numericValue) ? numericValue : 0;
      var customData = {
        currency: 'USD',
        value: safeValue,
        content_category: 'supplement',
        content_type: 'product',
        num_items: 1,
      };
      if (tierProduct) {
        customData.content_ids = [tierProduct];
        customData.content_name = PRODUCT + '-' + tierProduct;
        customData.contents = [{ id: tierProduct, quantity: 1, item_price: safeValue }];
      }
      try { if (window.fbq) fbq('track', 'InitiateCheckout', customData, { eventID: eventId }); } catch (_) {}
      try {
        var payload = JSON.stringify({
          event_name: 'InitiateCheckout',
          event_id: eventId,
          event_time: Math.floor(Date.now() / 1000),
          event_source_url: window.location.href,
          user_data: {},
          custom_data: customData,
        });
        navigator.sendBeacon('/tracker', new Blob([payload], { type: 'application/json' }));
      } catch (_) {}
    }

    var ctas = document.querySelectorAll('a.js-bg-cta');
    for (var i = 0; i < ctas.length; i++) {
      ctas[i].addEventListener('click', function (e) {
        e.preventDefault();
        var a = e.currentTarget;
        fireInitiateCheckout(a.dataset.bgValue, a.dataset.bgProduct);

        var base = a.getAttribute('href') || '';
        var params = new URLSearchParams();
        params.set('subid', subid);
        if (a.dataset.bgValue)   params.set('subid2', a.dataset.bgValue);
        if (a.dataset.bgProduct) params.set('subid3', a.dataset.bgProduct);
        params.set('prod', PRODUCT);

        var sep = base.indexOf('?') === -1 ? '?' : '&';
        var dest = base + sep + params.toString();

        var navigated = false;
        function go() { if (navigated) return; navigated = true; window.location.href = dest; }
        Promise.resolve(checkoutSessionReady).then(go, go);
        setTimeout(go, 700);
      });
    }
  })();
  </script>

</body>

</html>
